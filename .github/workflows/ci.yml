name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
      - name: Install workspace
        run: uv sync --all-packages
      - name: Lint
        run: |
          uv run ruff check .
          uv run ruff format --check .
      - name: Typecheck (strict)
        run: uv run mypy
      - name: Tests + coverage gate
        run: uv run pytest
