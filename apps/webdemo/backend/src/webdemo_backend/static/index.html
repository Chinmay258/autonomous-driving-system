<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AV Route Planning Demo</title>
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<style>
  :root { --bg:#0e1116; --panel:#161b22cc; --line:#2d333b; --text:#e6edf3; --dim:#8b949e; --accent:#3fb950; --route:#58a6ff; }
  html,body { margin:0; height:100%; background:var(--bg); font:14px/1.45 system-ui,Segoe UI,Roboto,sans-serif; color:var(--text); }
  #map { position:absolute; inset:0; }
  .panel { position:absolute; z-index:10; background:var(--panel); backdrop-filter:blur(8px);
           border:1px solid var(--line); border-radius:12px; padding:14px 16px; }
  #hud { top:16px; left:16px; width:280px; }
  #hud h1 { margin:0 0 4px; font-size:16px; }
  #hud p { margin:4px 0; color:var(--dim); font-size:12.5px; }
  #stats { top:16px; right:16px; width:220px; display:none; }
  .row { display:flex; justify-content:space-between; margin:3px 0; font-size:13px; }
  .row b { font-variant-numeric:tabular-nums; }
  #bar { height:6px; background:var(--line); border-radius:3px; margin-top:8px; overflow:hidden; }
  #fill { height:100%; width:0%; background:var(--accent); transition:width .15s linear; }
  .btns { display:flex; gap:8px; margin-top:10px; }
  button { flex:1; background:#21262d; color:var(--text); border:1px solid var(--line);
           border-radius:8px; padding:7px 0; cursor:pointer; font-size:13px; }
  button:hover { border-color:var(--dim); }
  button.primary { background:var(--accent); color:#04160a; border:none; font-weight:600; }
  button:disabled { opacity:.4; cursor:default; }
  select { width:100%; margin-top:8px; background:#21262d; color:var(--text);
           border:1px solid var(--line); border-radius:8px; padding:6px; }
  #state { font-weight:600; color:var(--accent); text-transform:capitalize; }
  .marker-dot { width:14px; height:14px; border-radius:50%; border:2.5px solid #fff; box-shadow:0 0 6px #000a; }
  #car { width:0; height:0; border-left:8px solid transparent; border-right:8px solid transparent;
         border-bottom:22px solid var(--accent); filter:drop-shadow(0 0 5px #3fb95088); }
</style>
</head>
<body>
<div id="map"></div>

<div id="hud" class="panel">
  <h1>AV Route Planning Demo</h1>
  <p>Click the road network to set a <b style="color:#3fb950">start</b>, then a
     <b style="color:#f85149">destination</b>. The planner (A* over a Lanelet2-style
     graph) finds a route and a simulated vehicle drives it.</p>
  <select id="cost">
    <option value="travel_time">Optimize travel time</option>
    <option value="distance">Optimize distance</option>
  </select>
  <div class="btns">
    <button id="go" class="primary" disabled>Drive</button>
    <button id="reset">Reset</button>
  </div>
</div>

<div id="stats" class="panel">
  <div class="row"><span>State</span><b id="state">–</b></div>
  <div class="row"><span>Speed</span><b id="speed">0.0 m/s</b></div>
  <div class="row"><span>Cross-track err</span><b id="cte">0.00 m</b></div>
  <div class="row"><span>Route</span><b id="dist">–</b></div>
  <div class="row"><span>ETA</span><b id="eta">–</b></div>
  <div id="bar"><div id="fill"></div></div>
  <div class="btns">
    <button id="pause">Pause</button>
    <button id="cancel">Cancel</button>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
let start = null, goal = null, routeId = null, ws = null, paused = false;
let startMarker = null, goalMarker = null, carMarker = null;

const map = new maplibregl.Map({
  container: 'map',
  style: { version: 8, sources: {}, layers: [
    { id: 'bg', type: 'background', paint: { 'background-color': '#0e1116' } }
  ]},
  center: [7.4258, 43.7395], zoom: 15.5, attributionControl: false,
});
map.addControl(new maplibregl.NavigationControl({ showCompass: false }), 'bottom-right');

map.on('load', async () => {
  const roads = await (await fetch('/map/roads')).json();
  map.addSource('roads', { type: 'geojson', data: roads });
  map.addLayer({ id: 'roads-casing', type: 'line', source: 'roads',
    paint: { 'line-color': '#1c2128', 'line-width': 9 },
    layout: { 'line-cap': 'round', 'line-join': 'round' } });
  map.addLayer({ id: 'roads', type: 'line', source: 'roads',
    paint: { 'line-color': '#30363d', 'line-width': 6 },
    layout: { 'line-cap': 'round', 'line-join': 'round' } });
  map.addSource('route', { type: 'geojson', data: emptyFC() });
  map.addLayer({ id: 'route', type: 'line', source: 'route',
    paint: { 'line-color': '#58a6ff', 'line-width': 4, 'line-opacity': 0.9 },
    layout: { 'line-cap': 'round', 'line-join': 'round' } });
  map.addSource('trail', { type: 'geojson', data: emptyFC() });
  map.addLayer({ id: 'trail', type: 'line', source: 'trail',
    paint: { 'line-color': '#3fb950', 'line-width': 2.5, 'line-opacity': 0.85 } });

  const bounds = new maplibregl.LngLatBounds();
  roads.features.forEach(f => f.geometry.coordinates.forEach(c => bounds.extend(c)));
  map.fitBounds(bounds, { padding: 60 });
});

const emptyFC = () => ({ type: 'FeatureCollection', features: [] });
const lineFC = coords => ({ type: 'FeatureCollection',
  features: [{ type: 'Feature', properties: {}, geometry: { type: 'LineString', coordinates: coords } }] });

function dot(color) {
  const el = document.createElement('div');
  el.className = 'marker-dot'; el.style.background = color;
  return el;
}

map.on('click', e => {
  if (ws) return; // no re-marking mid-drive
  const lngLat = [e.lngLat.lng, e.lngLat.lat];
  if (!start || (start && goal)) {
    reset();
    start = lngLat;
    startMarker = new maplibregl.Marker({ element: dot('#3fb950') }).setLngLat(lngLat).addTo(map);
  } else {
    goal = lngLat;
    goalMarker = new maplibregl.Marker({ element: dot('#f85149') }).setLngLat(lngLat).addTo(map);
    plan();
  }
});

async function plan() {
  const body = { start: { lat: start[1], lng: start[0] },
                 goal: { lat: goal[1], lng: goal[0] }, cost: $('cost').value };
  const res = await fetch('/plan', { method: 'POST',
    headers: { 'content-type': 'application/json' }, body: JSON.stringify(body) });
  const data = await res.json();
  if (!res.ok) { alert(`Planning failed: ${data.detail || data.error}`); reset(); return; }
  routeId = data.route_id;
  map.getSource('route').setData(lineFC(data.geometry.coordinates));
  $('dist').textContent = `${Math.round(data.distance_m)} m`;
  $('eta').textContent = `${Math.round(data.eta_s)} s`;
  $('go').disabled = false;
  $('stats').style.display = 'block';
  $('state').textContent = 'ready';
}

$('go').onclick = () => {
  if (!routeId || ws) return;
  $('go').disabled = true;
  const trail = [];
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws/drive?route_id=${routeId}`);
  ws.onopen = () => ws.send(JSON.stringify({ cmd: 'start' }));
  ws.onmessage = ev => {
    const f = JSON.parse(ev.data);
    if (!carMarker) {
      const el = document.createElement('div'); el.id = 'car';
      carMarker = new maplibregl.Marker({ element: el, rotationAlignment: 'map' })
        .setLngLat([f.lng, f.lat]).addTo(map);
    }
    carMarker.setLngLat([f.lng, f.lat]).setRotation(f.heading_deg);
    trail.push([f.lng, f.lat]);
    if (trail.length > 1) map.getSource('trail').setData(lineFC(trail));
    $('state').textContent = f.state;
    $('speed').textContent = `${(f.speed_mps * 3.6).toFixed(1)} km/h`;
    $('cte').textContent = `${f.cte_m.toFixed(2)} m`;
    $('fill').style.width = `${(f.progress * 100).toFixed(1)}%`;
    if (f.state === 'arrived' || f.state === 'aborted') { ws.close(); ws = null; }
  };
  ws.onclose = () => { ws = null; };
};

$('pause').onclick = () => {
  if (!ws) return;
  paused = !paused;
  ws.send(JSON.stringify({ cmd: paused ? 'pause' : 'resume' }));
  $('pause').textContent = paused ? 'Resume' : 'Pause';
};

$('cancel').onclick = () => { if (ws) ws.send(JSON.stringify({ cmd: 'cancel' })); };

function reset() {
  if (ws) { ws.close(); ws = null; }
  [startMarker, goalMarker, carMarker].forEach(m => m && m.remove());
  startMarker = goalMarker = carMarker = null;
  start = goal = routeId = null; paused = false;
  if (map.getSource('route')) map.getSource('route').setData(emptyFC());
  if (map.getSource('trail')) map.getSource('trail').setData(emptyFC());
  $('go').disabled = true; $('stats').style.display = 'none';
  $('pause').textContent = 'Pause';
}
$('reset').onclick = reset;
</script>
</body>
</html>
