# Migration target (ADR-0003). Same image, zero code changes:
#   fly launch --copy-config --no-deploy && fly deploy
app = "av-route-demo"
primary_region = "fra"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
