[project]
name = "avmap-tools"
version = "0.1.0"
description = "Map tooling: Lanelet2 OSM IO, graph derivation, validation, synthetic maps"
requires-python = ">=3.11"
dependencies = ["avcore"]

[tool.uv.sources]
avcore = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/avmap_tools"]
