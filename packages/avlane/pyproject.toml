[project]
name = "avlane"
version = "0.1.0"
description = "Camera lane detection: classical CV pipeline with metric output"
requires-python = ">=3.11"
dependencies = [
    "numpy>=1.26",
    "opencv-python-headless>=4.9",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/avlane"]
